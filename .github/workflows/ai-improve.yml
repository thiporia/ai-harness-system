name: AI Continuous Improvement

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  improve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Run AI improvement
        run: node scripts/ai-improve.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate Build
        run: npm run build

      - name: Validate Tests
        run: npm run test

      - name: Commit
        run: |
          git config user.name "ai-agent"
          git config user.email "ai@bot.com"
          git add .
          git commit -m "AI improvement" || echo "No changes"

      - name: Push
        run: git push
